<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>LINE Rich Menu — SME OPS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; background: #0d1025; font-family: -apple-system, 'Noto Sans TC', sans-serif;
    padding: 40px;
  }
  .info {
    color: #94a3b8; font-size: 14px; margin-bottom: 24px; text-align: center;
  }
  .info strong { color: #22d3ee; }

  /* Rich Menu Canvas — 2500x1686 scaled to 1/3 */
  .rich-menu {
    width: 2500px; height: 1686px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 0;
    background: #f0f2f5;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  .menu-cell {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px; cursor: default;
    position: relative; overflow: hidden;
  }

  /* Ambient glow behind icon */
  .menu-cell::before {
    content: '';
    position: absolute;
    width: 450px; height: 450px;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    opacity: 0.08;
    background: radial-gradient(circle, currentColor 0%, transparent 70%);
    filter: blur(16px);
    pointer-events: none;
  }

  /* Subtle bottom accent line */
  .menu-cell::after {
    content: '';
    position: absolute; bottom: 0; left: 20%; right: 20%; height: 4px;
    background: linear-gradient(90deg, transparent, currentColor, transparent);
    opacity: 0.15;
    border-radius: 1px;
  }

  /* Divider lines */
  .menu-cell {
    border-right: 1px solid rgba(0,0,0,0.05);
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .menu-cell:nth-child(3n) { border-right: none; }
  .menu-cell:nth-child(n+4) { border-bottom: none; }

  .icon-wrap {
    width: 360px; height: 360px;
    border-radius: 100px;
    display: flex; align-items: center; justify-content: center;
    font-size: 200px;
    position: relative; z-index: 1;
  }

  .label {
    font-size: 160px; font-weight: 800;
    letter-spacing: 12px;
    position: relative; z-index: 1;
    color: #1e293b;
  }

  .sub {
    font-size: 52px; font-weight: 600;
    color: #94a3b8;
    letter-spacing: 8px;
    position: relative; z-index: 1;
    margin-top: -10px;
    text-transform: uppercase;
  }

  /* ── Cell themes (light) ── */
  .cell-clock {
    background: linear-gradient(170deg, #f8fcff 0%, #f0f6ff 100%);
    color: #0891b2;
  }
  .cell-clock .icon-wrap {
    background: linear-gradient(145deg, rgba(8,145,178,0.12), rgba(8,145,178,0.04));
    border: 1.5px solid rgba(8,145,178,0.2);
    box-shadow: 0 6px 24px rgba(8,145,178,0.12);
  }

  .cell-leave {
    background: linear-gradient(170deg, #f6f8ff 0%, #eef2ff 100%);
    color: #2563eb;
  }
  .cell-leave .icon-wrap {
    background: linear-gradient(145deg, rgba(37,99,235,0.12), rgba(37,99,235,0.04));
    border: 1.5px solid rgba(37,99,235,0.2);
    box-shadow: 0 6px 24px rgba(37,99,235,0.12);
  }

  .cell-salary {
    background: linear-gradient(170deg, #f4fdf9 0%, #ecfdf5 100%);
    color: #059669;
  }
  .cell-salary .icon-wrap {
    background: linear-gradient(145deg, rgba(5,150,105,0.12), rgba(5,150,105,0.04));
    border: 1.5px solid rgba(5,150,105,0.2);
    box-shadow: 0 6px 24px rgba(5,150,105,0.12);
  }

  .cell-inventory {
    background: linear-gradient(170deg, #fffbf5 0%, #fff7ed 100%);
    color: #ea580c;
  }
  .cell-inventory .icon-wrap {
    background: linear-gradient(145deg, rgba(234,88,12,0.12), rgba(234,88,12,0.04));
    border: 1.5px solid rgba(234,88,12,0.2);
    box-shadow: 0 6px 24px rgba(234,88,12,0.12);
  }

  .cell-expense {
    background: linear-gradient(170deg, #faf8ff 0%, #f5f3ff 100%);
    color: #7c3aed;
  }
  .cell-expense .icon-wrap {
    background: linear-gradient(145deg, rgba(124,58,237,0.12), rgba(124,58,237,0.04));
    border: 1.5px solid rgba(124,58,237,0.2);
    box-shadow: 0 6px 24px rgba(124,58,237,0.12);
  }

  .cell-more {
    background: linear-gradient(170deg, #fef6fa 0%, #fdf2f8 100%);
    color: #db2777;
  }
  .cell-more .icon-wrap {
    background: linear-gradient(145deg, rgba(219,39,119,0.12), rgba(219,39,119,0.04));
    border: 1.5px solid rgba(219,39,119,0.2);
    box-shadow: 0 6px 24px rgba(219,39,119,0.12);
  }

  .tip {
    color: #475569; font-size: 12px; margin-top: 24px; text-align: center; line-height: 2;
  }
  .tip code {
    background: rgba(34,211,238,0.1); color: #22d3ee;
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
  }
</style>
</head>
<body>
  <div class="info">
    LINE Rich Menu — 實際尺寸 <strong>2500 x 1686</strong>（1/3 縮放預覽）
  </div>

  <div class="rich-menu">
    <div class="menu-cell cell-clock">
      <div class="icon-wrap">
        <svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="10" stroke-dasharray="2 3" opacity="0.3"/>
          <polyline points="12 6 12 12 16.5 14"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <!-- tick marks -->
          <line x1="12" y1="2.5" x2="12" y2="4" opacity="0.4"/>
          <line x1="12" y1="20" x2="12" y2="21.5" opacity="0.4"/>
          <line x1="2.5" y1="12" x2="4" y2="12" opacity="0.4"/>
          <line x1="20" y1="12" x2="21.5" y2="12" opacity="0.4"/>
          <!-- small bell -->
          <path d="M18.5 3.5 C19.5 2.5 21 3 21 4.5" opacity="0.5"/>
        </svg>
      </div>
      <div class="label">打卡</div>
      <div class="sub">Clock In / Out</div>
    </div>
    <div class="menu-cell cell-leave">
      <div class="icon-wrap">
        <svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2.5"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <!-- date cells -->
          <rect x="6" y="12.5" width="2.5" height="2" rx="0.5" opacity="0.2" fill="currentColor" stroke="none"/>
          <rect x="10.75" y="12.5" width="2.5" height="2" rx="0.5" opacity="0.2" fill="currentColor" stroke="none"/>
          <rect x="15.5" y="12.5" width="2.5" height="2" rx="0.5" opacity="0.2" fill="currentColor" stroke="none"/>
          <rect x="6" y="17" width="2.5" height="2" rx="0.5" opacity="0.2" fill="currentColor" stroke="none"/>
          <!-- checked date -->
          <rect x="10.75" y="17" width="2.5" height="2" rx="0.5" opacity="0.35" fill="currentColor" stroke="none"/>
          <polyline points="11 18.2 11.7 18.8 12.8 17.5" stroke-width="0.8" opacity="0.9"/>
          <rect x="15.5" y="17" width="2.5" height="2" rx="0.5" opacity="0.15" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="label">請假</div>
      <div class="sub">Leave Request</div>
    </div>
    <div class="menu-cell cell-salary">
      <div class="icon-wrap">
        <svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <!-- wallet body -->
          <rect x="2" y="6" width="20" height="14" rx="2.5"/>
          <path d="M2 6 C2 4 4 3 6 3 h8 c2 0 3 1 3 3" opacity="0.4"/>
          <!-- card slot -->
          <rect x="14" y="11" width="8" height="5" rx="1.5"/>
          <circle cx="17" cy="13.5" r="1.2" fill="currentColor" stroke="none" opacity="0.5"/>
          <!-- money lines -->
          <line x1="5" y1="10" x2="10" y2="10" opacity="0.3"/>
          <line x1="5" y1="12.5" x2="9" y2="12.5" opacity="0.2"/>
          <!-- coin -->
          <circle cx="7" cy="16" r="1.5" opacity="0.3" fill="currentColor" stroke="none"/>
          <text x="6.2" y="16.8" font-size="2.2" font-weight="700" fill="white" stroke="none">$</text>
        </svg>
      </div>
      <div class="label">薪水</div>
      <div class="sub">My Salary</div>
    </div>
    <div class="menu-cell cell-inventory">
      <div class="icon-wrap">
        <svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <!-- main box -->
          <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
          <path d="m3.3 7 8.7 5 8.7-5"/>
          <path d="M12 22V12"/>
          <!-- tape cross on top -->
          <path d="M7.5 4.5 L16.5 9.5" opacity="0.25" stroke-width="2"/>
          <path d="M16.5 4.5 L7.5 9.5" opacity="0.25" stroke-width="2"/>
          <!-- small box behind -->
          <rect x="16" y="1" width="5" height="4" rx="0.8" opacity="0.25"/>
          <line x1="18.5" y1="1" x2="18.5" y2="5" opacity="0.15"/>
        </svg>
      </div>
      <div class="label">庫存</div>
      <div class="sub">Inventory</div>
    </div>
    <div class="menu-cell cell-expense">
      <div class="icon-wrap">
        <svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <!-- receipt body -->
          <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/>
          <!-- line items -->
          <line x1="8" y1="7" x2="12" y2="7" opacity="0.5"/>
          <line x1="14" y1="7" x2="16" y2="7" opacity="0.3"/>
          <line x1="8" y1="10" x2="11" y2="10" opacity="0.4"/>
          <line x1="13" y1="10" x2="16" y2="10" opacity="0.3"/>
          <line x1="8" y1="13" x2="10" y2="13" opacity="0.3"/>
          <line x1="12" y1="13" x2="16" y2="13" opacity="0.3"/>
          <!-- total line -->
          <line x1="8" y1="16.5" x2="16" y2="16.5" stroke-dasharray="1.5 1" opacity="0.3"/>
          <line x1="12" y1="18.5" x2="16" y2="18.5" stroke-width="1.5" opacity="0.6"/>
          <!-- check mark -->
          <circle cx="19" cy="19" r="3.5" fill="currentColor" opacity="0.2" stroke="none"/>
          <polyline points="17.5 19 18.5 20 20.5 17.5" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="label">報帳</div>
      <div class="sub">Expense</div>
    </div>
    <div class="menu-cell cell-more">
      <div class="icon-wrap">
        <svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <!-- 4 rounded squares grid -->
          <rect x="3" y="3" width="7.5" height="7.5" rx="2" />
          <rect x="13.5" y="3" width="7.5" height="7.5" rx="2" />
          <rect x="3" y="13.5" width="7.5" height="7.5" rx="2" />
          <rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2" stroke-dasharray="2 2" opacity="0.5"/>
          <!-- mini icons inside -->
          <circle cx="6.75" cy="6.75" r="1.5" opacity="0.25" fill="currentColor" stroke="none"/>
          <path d="M16 6 l1.5 1.5 l1.5-1.5" opacity="0.35"/>
          <line x1="5.5" y1="17.25" x2="8" y2="17.25" opacity="0.3"/>
          <!-- plus sign in dashed box -->
          <line x1="17.25" y1="15.5" x2="17.25" y2="19.5" opacity="0.5"/>
          <line x1="15.25" y1="17.25" x2="19.25" y2="17.25" opacity="0.5"/>
        </svg>
      </div>
      <div class="label">更多</div>
      <div class="sub">More</div>
    </div>
  </div>

  <button id="downloadBtn" onclick="downloadImage()" style="
    margin-top: 24px; padding: 14px 40px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #22d3ee, #3b82f6); color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 20px rgba(34,211,238,0.3);
    letter-spacing: 1px;
  ">下載圖片 (2500 x 1686)</button>

  <div class="tip" style="margin-top: 16px;">
    點擊上方按鈕直接下載 PNG，上傳至 LINE Official Account Manager → Rich Menu
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    async function downloadImage() {
      const btn = document.getElementById('downloadBtn');
      btn.textContent = '產生中...';
      btn.disabled = true;

      const el = document.querySelector('.rich-menu');
      const canvas = await html2canvas(el, {
        scale: 1,
        useCORS: true,
        backgroundColor: null,
        width: 2500,
        height: 1686,
      });

      const link = document.createElement('a');
      link.download = 'sme-ops-rich-menu-2500x1686.png';
      link.href = canvas.toDataURL('image/png');
      link.click();

      btn.textContent = '下載圖片 (2500 x 1686)';
      btn.disabled = false;
    }
  </script>
</body>
</html>
