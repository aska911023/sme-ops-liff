<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>LINE Rich Menu — SME OPS (Duotone)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; background: #0d1025; font-family: -apple-system, 'Noto Sans TC', sans-serif;
    padding: 40px;
  }
  .info { color: #94a3b8; font-size: 14px; margin-bottom: 24px; text-align: center; }
  .info strong { color: #22d3ee; }

  .rich-menu {
    width: 2500px; height: 1686px;
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
    gap: 0; background: #f0f2f5; border-radius: 8px; overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  .menu-cell {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px; cursor: default; position: relative; overflow: hidden;
  }

  /* Subtle bottom accent */
  .menu-cell::after {
    content: ''; position: absolute; bottom: 0; left: 15%; right: 15%; height: 5px;
    background: linear-gradient(90deg, transparent, currentColor, transparent);
    opacity: 0.12; border-radius: 2px;
  }

  .menu-cell { border-right: 1px solid rgba(0,0,0,0.04); border-bottom: 1px solid rgba(0,0,0,0.04); }
  .menu-cell:nth-child(3n) { border-right: none; }
  .menu-cell:nth-child(n+4) { border-bottom: none; }

  /* Duotone icon container — larger filled shape behind */
  .icon-wrap {
    width: 400px; height: 400px; border-radius: 110px;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  /* The filled background shape */
  .icon-wrap .bg-shape {
    position: absolute; inset: 0; border-radius: 110px; opacity: 0.12;
  }
  /* The SVG icon on top */
  .icon-wrap svg { position: relative; z-index: 2; }

  .label {
    font-size: 160px; font-weight: 800; letter-spacing: 12px;
    position: relative; z-index: 1; color: #1e293b;
  }
  .sub {
    font-size: 48px; font-weight: 600; color: #94a3b8;
    letter-spacing: 6px; position: relative; z-index: 1;
    margin-top: -20px; text-transform: uppercase;
  }

  /* ── Cell themes ── */
  .cell-clock { background: linear-gradient(170deg, #f8fcff 0%, #f0f6ff 100%); color: #0891B2; }
  .cell-clock .bg-shape { background: #0891B2; }
  .cell-clock .icon-wrap { border: 2px solid rgba(8,145,178,0.15); }

  .cell-leave { background: linear-gradient(170deg, #f6f8ff 0%, #eef2ff 100%); color: #2563EB; }
  .cell-leave .bg-shape { background: #2563EB; }
  .cell-leave .icon-wrap { border: 2px solid rgba(37,99,235,0.15); }

  .cell-salary { background: linear-gradient(170deg, #f4fdf9 0%, #ecfdf5 100%); color: #059669; }
  .cell-salary .bg-shape { background: #059669; }
  .cell-salary .icon-wrap { border: 2px solid rgba(5,150,105,0.15); }

  .cell-inventory { background: linear-gradient(170deg, #fffbf5 0%, #fff7ed 100%); color: #EA580C; }
  .cell-inventory .bg-shape { background: #EA580C; }
  .cell-inventory .icon-wrap { border: 2px solid rgba(234,88,12,0.15); }

  .cell-expense { background: linear-gradient(170deg, #faf8ff 0%, #f5f3ff 100%); color: #7C3AED; }
  .cell-expense .bg-shape { background: #7C3AED; }
  .cell-expense .icon-wrap { border: 2px solid rgba(124,58,237,0.15); }

  .cell-more { background: linear-gradient(170deg, #fef6fa 0%, #fdf2f8 100%); color: #DB2777; }
  .cell-more .bg-shape { background: #DB2777; }
  .cell-more .icon-wrap { border: 2px solid rgba(219,39,119,0.15); }

  .tip { color: #475569; font-size: 12px; margin-top: 24px; text-align: center; line-height: 2; }
</style>
</head>
<body>
  <div class="info">
    LINE Rich Menu — 實際尺寸 <strong>2500 x 1686</strong>（Duotone 雙色風格）
  </div>

  <div class="rich-menu">
    <!-- 打卡 -->
    <div class="menu-cell cell-clock">
      <div class="icon-wrap">
        <div class="bg-shape"></div>
        <svg width="220" height="220" viewBox="0 0 256 256" fill="none">
          <!-- Duotone fill -->
          <circle cx="128" cy="128" r="96" fill="currentColor" opacity="0.12"/>
          <!-- Outline -->
          <circle cx="128" cy="128" r="96" stroke="currentColor" stroke-width="12" fill="none"/>
          <polyline points="128 72 128 128 176 152" stroke="currentColor" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <!-- Center dot -->
          <circle cx="128" cy="128" r="8" fill="currentColor"/>
          <!-- Tick marks -->
          <line x1="128" y1="40" x2="128" y2="56" stroke="currentColor" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
          <line x1="128" y1="200" x2="128" y2="216" stroke="currentColor" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
          <line x1="40" y1="128" x2="56" y2="128" stroke="currentColor" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
          <line x1="200" y1="128" x2="216" y2="128" stroke="currentColor" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
        </svg>
      </div>
      <div class="label">打卡</div>
      <div class="sub">Clock In / Out</div>
    </div>

    <!-- 請假 -->
    <div class="menu-cell cell-leave">
      <div class="icon-wrap">
        <div class="bg-shape"></div>
        <svg width="220" height="220" viewBox="0 0 256 256" fill="none">
          <!-- Duotone calendar body -->
          <rect x="32" y="56" width="192" height="176" rx="16" fill="currentColor" opacity="0.12"/>
          <!-- Outline -->
          <rect x="32" y="56" width="192" height="176" rx="16" stroke="currentColor" stroke-width="12" fill="none"/>
          <!-- Hooks -->
          <line x1="80" y1="32" x2="80" y2="80" stroke="currentColor" stroke-width="12" stroke-linecap="round"/>
          <line x1="176" y1="32" x2="176" y2="80" stroke="currentColor" stroke-width="12" stroke-linecap="round"/>
          <!-- Divider line -->
          <line x1="32" y1="112" x2="224" y2="112" stroke="currentColor" stroke-width="12"/>
          <!-- Check mark -->
          <polyline points="96 164 116 184 160 140" stroke="currentColor" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div class="label">請假</div>
      <div class="sub">Leave Request</div>
    </div>

    <!-- 薪水 -->
    <div class="menu-cell cell-salary">
      <div class="icon-wrap">
        <div class="bg-shape"></div>
        <svg width="220" height="220" viewBox="0 0 256 256" fill="none">
          <!-- Duotone wallet -->
          <rect x="24" y="64" width="208" height="160" rx="16" fill="currentColor" opacity="0.12"/>
          <rect x="24" y="64" width="208" height="160" rx="16" stroke="currentColor" stroke-width="12" fill="none"/>
          <!-- Flap -->
          <path d="M24 80 C24 52 44 40 68 40 h72 c24 0 36 12 36 28" stroke="currentColor" stroke-width="12" fill="none" opacity="0.5"/>
          <!-- Card slot -->
          <rect x="152" y="120" width="80" height="48" rx="12" stroke="currentColor" stroke-width="10" fill="none"/>
          <circle cx="184" cy="144" r="10" fill="currentColor" opacity="0.5"/>
          <!-- Dollar sign -->
          <line x1="80" y1="104" x2="80" y2="188" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
          <path d="M100 120 H72 a16 16 0 0 0 0 32 h16 a16 16 0 0 1 0 32 H60" stroke="currentColor" stroke-width="10" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="label">薪水</div>
      <div class="sub">My Salary</div>
    </div>

    <!-- 庫存 -->
    <div class="menu-cell cell-inventory">
      <div class="icon-wrap">
        <div class="bg-shape"></div>
        <svg width="220" height="220" viewBox="0 0 256 256" fill="none">
          <!-- Duotone box fill -->
          <path d="M224 88 L128 140 L32 88 L128 36 Z" fill="currentColor" opacity="0.12"/>
          <path d="M128 140 v88 l96-52 V88 Z" fill="currentColor" opacity="0.06"/>
          <!-- Box outline -->
          <path d="M224 88 L128 140 L32 88 L128 36 Z" stroke="currentColor" stroke-width="12" stroke-linejoin="round" fill="none"/>
          <path d="M128 140 v88" stroke="currentColor" stroke-width="12"/>
          <path d="M224 88 v88 l-96 52 l-96-52 v-88" stroke="currentColor" stroke-width="12" stroke-linejoin="round" fill="none"/>
          <!-- Cross tape -->
          <line x1="80" y1="62" x2="176" y2="114" stroke="currentColor" stroke-width="8" opacity="0.25"/>
        </svg>
      </div>
      <div class="label">庫存</div>
      <div class="sub">Inventory</div>
    </div>

    <!-- 報帳 -->
    <div class="menu-cell cell-expense">
      <div class="icon-wrap">
        <div class="bg-shape"></div>
        <svg width="220" height="220" viewBox="0 0 256 256" fill="none">
          <!-- Duotone receipt -->
          <path d="M48 24 v208 l24-16 24 16 24-16 24 16 24-16 24 16 24-16 24 16 V24 l-24 16-24-16-24 16-24-16-24 16-24-16-24 16Z" fill="currentColor" opacity="0.12"/>
          <path d="M48 24 v208 l24-16 24 16 24-16 24 16 24-16 24 16 24-16 24 16 V24 l-24 16-24-16-24 16-24-16-24 16-24-16-24 16Z" stroke="currentColor" stroke-width="12" fill="none"/>
          <!-- Lines -->
          <line x1="88" y1="88" x2="128" y2="88" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
          <line x1="144" y1="88" x2="168" y2="88" stroke="currentColor" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
          <line x1="88" y1="120" x2="120" y2="120" stroke="currentColor" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
          <line x1="136" y1="120" x2="168" y2="120" stroke="currentColor" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
          <line x1="88" y1="152" x2="168" y2="152" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 6" opacity="0.3"/>
          <!-- Total -->
          <line x1="120" y1="176" x2="168" y2="176" stroke="currentColor" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </div>
      <div class="label">報帳</div>
      <div class="sub">Expense</div>
    </div>

    <!-- 更多 -->
    <div class="menu-cell cell-more">
      <div class="icon-wrap">
        <div class="bg-shape"></div>
        <svg width="220" height="220" viewBox="0 0 256 256" fill="none">
          <!-- 4 rounded squares -->
          <rect x="32" y="32" width="84" height="84" rx="16" fill="currentColor" opacity="0.12" stroke="currentColor" stroke-width="12"/>
          <rect x="140" y="32" width="84" height="84" rx="16" fill="currentColor" opacity="0.08" stroke="currentColor" stroke-width="12"/>
          <rect x="32" y="140" width="84" height="84" rx="16" fill="currentColor" opacity="0.08" stroke="currentColor" stroke-width="12"/>
          <!-- Dashed square with plus -->
          <rect x="140" y="140" width="84" height="84" rx="16" stroke="currentColor" stroke-width="10" stroke-dasharray="16 10" fill="none" opacity="0.5"/>
          <line x1="182" y1="162" x2="182" y2="204" stroke="currentColor" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
          <line x1="161" y1="182" x2="203" y2="182" stroke="currentColor" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
          <!-- Mini icons -->
          <circle cx="74" cy="74" r="16" fill="currentColor" opacity="0.2"/>
          <path d="M170 64 l12 16 l12-16" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" fill="none"/>
          <line x1="56" y1="182" x2="92" y2="182" stroke="currentColor" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
        </svg>
      </div>
      <div class="label">更多</div>
      <div class="sub">More</div>
    </div>
  </div>

  <button id="downloadBtn" onclick="downloadImage()" type="button" style="
    margin-top: 24px; padding: 14px 40px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #22d3ee, #3b82f6); color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 20px rgba(34,211,238,0.3); letter-spacing: 1px;
  ">下載圖片 (2500 x 1686)</button>

  <div class="tip" style="margin-top: 16px;">
    點擊上方按鈕直接下載 PNG，上傳至 LINE Official Account Manager → Rich Menu
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    async function downloadImage() {
      const btn = document.getElementById('downloadBtn');
      btn.textContent = '產生中...';
      btn.disabled = true;
      const el = document.querySelector('.rich-menu');
      const canvas = await html2canvas(el, { scale: 1, useCORS: true, backgroundColor: null, width: 2500, height: 1686 });
      const link = document.createElement('a');
      link.download = 'sme-ops-rich-menu-duotone-2500x1686.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.textContent = '下載圖片 (2500 x 1686)';
      btn.disabled = false;
    }
  </script>
</body>
</html>
